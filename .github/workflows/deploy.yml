name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: gemini-devops-bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    
    - name: Create .env file from secrets
      run: echo "${{ secrets.ENV_FILE }}" > .env
    
    - name: Save Docker image
      run: |
        docker save gemini-devops-bot:latest | gzip > gemini-devops-bot.tar.gz
    
    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || '22' }}
        source: "gemini-devops-bot.tar.gz,docker-compose.yml,.env"
        target: "/opt/gemini-devops-bot/"
        strip_components: 0
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || '22' }}
        script: |
          # Create directory and set ownership
          sudo mkdir -p /opt/gemini-devops-bot
          sudo chown -R ${{ secrets.EC2_USERNAME }}:${{ secrets.EC2_USERNAME }} /opt/gemini-devops-bot
          
          cd /opt/gemini-devops-bot
          
          # Install Docker if not present
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker ${{ secrets.EC2_USERNAME }}
          fi
          
          # Install Docker Compose if not present
          if ! command -v docker-compose &> /dev/null; then
            echo "Installing Docker Compose..."
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          
          # Load Docker image
          docker load < gemini-devops-bot.tar.gz
          
          # Stop and remove existing container
          docker-compose down || true
          
          # Remove old image
          docker rmi gemini-devops-bot:old || true
          
          # Tag current image as old before pulling new one
          docker tag gemini-devops-bot:latest gemini-devops-bot:old || true
          
          # Start new container
          docker-compose up -d
          
          # Wait for container to be healthy
          sleep 10
          
          # Show container status
          docker-compose ps
          
          # Show logs for debugging
          docker-compose logs --tail=20
          
          # Cleanup
          docker system prune -f
          rm gemini-devops-bot.tar.gz
    
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || '22' }}
        script: |
          cd /opt/gemini-devops-bot
          
          # Check container status
          echo "=== Container Status ==="
          docker-compose ps
          
          # Check container logs
          echo "=== Recent Logs ==="
          docker-compose logs --tail=10
          
          # Health check
          echo "=== Health Check ==="
          if docker-compose ps | grep -q "Up (healthy)"; then
            echo "✅ Deployment successful - Container is healthy"
          elif docker-compose ps | grep -q "Up"; then
            echo "✅ Deployment successful - Container is running"
          else
            echo "❌ Deployment failed - Container is not running"
            exit 1
          fi
    
    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🚀 Deployment to EC2 completed successfully!"
          echo "🤖 Bot is now running on: ${{ secrets.EC2_HOST }}:${{ secrets.EC2_PORT || '22' }}"
        else
          echo "❌ Deployment failed!"
          echo "Please check logs above for details."
        fi
