version: '3.8'

services:
  gemini-devops-bot:
    image: gemini-devops-bot:latest
    container_name: gemini-devops-bot
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      # Mount logs directory if needed
      - ./logs:/app/logs
    networks:
      - bot-network
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bot-network:
    driver: bridge

volumes:
  logs:
    driver: local
